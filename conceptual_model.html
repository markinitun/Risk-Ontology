  :root {
    --bg: #0a0f1a;
    --surface: #111827;
    --surface-hover: #1e293b;
    --border: #1e3a5f;
    --border-light: #2d4a6f;
    --text: #e2e8f0;
    --text-dim: #94a3b8;
    --text-muted: #64748b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  #header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: rgba(10,15,26,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  #header h1 { font-size: 16px; font-weight: 700; letter-spacing: 0.02em; color: #38bdf8; }
  #header .subtitle { font-size: 12px; color: var(--text-muted); font-weight: 400; }

  .legend { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; }
  .legend-line { width: 18px; height: 2px; border-radius: 1px; }
  .legend-node { width: 10px; height: 10px; border-radius: 2px; border: 1.5px solid; }

  #canvas { width: 100%; height: 100%; cursor: grab; }
  #canvas:active { cursor: grabbing; }

  #tooltip {
    position: fixed; display: none; background: var(--surface); border: 1px solid var(--border-light);
    border-radius: 8px; padding: 14px 18px; max-width: 400px; z-index: 200;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5); pointer-events: none;
  }
  #tooltip .tt-name { font-weight: 700; font-size: 14px; color: #38bdf8; margin-bottom: 4px; }
  #tooltip .tt-type { font-size: 11px; font-family: 'JetBrains Mono', monospace; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
  #tooltip .tt-desc { font-size: 13px; line-height: 1.5; color: var(--text-dim); }
  #tooltip .tt-synonyms { margin-top: 8px; font-size: 11px; color: var(--text-muted); font-style: italic; }
  #tooltip .tt-relations { margin-top: 10px; border-top: 1px solid var(--border); padding-top: 8px; }
  #tooltip .tt-rel { font-size: 12px; color: var(--text-dim); margin-bottom: 3px; font-family: 'JetBrains Mono', monospace; }

  #controls { position: fixed; bottom: 16px; right: 16px; display: flex; flex-direction: column; gap: 6px; z-index: 100; }
  #controls button {
    width: 36px; height: 36px; border: 1px solid var(--border); background: var(--surface);
    color: var(--text-dim); border-radius: 6px; cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center; transition: all 0.15s;
  }
  #controls button:hover { background: var(--surface-hover); color: var(--text); border-color: var(--border-light); }

  #info-panel {
    position: fixed; bottom: 16px; left: 16px; background: rgba(17,24,39,0.9);
    border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px;
    font-size: 11px; color: var(--text-muted); z-index: 100; font-family: 'JetBrains Mono', monospace; line-height: 1.8;
  }
  .cd { display: inline-block; width: 8px; height: 8px; border-radius: 2px; margin-right: 3px; vertical-align: middle; }
</style>

  subclass: { bg:'#1a1a2e', border:'#555',    text:'#e2e8f0', sw:1 },
  adjacent: { bg:'#2a1a2e', border:'#d946a8', text:'#f0abfc', sw:1.5 },
  example:  { bg:'#0f1a2e', border:'#2a6ab8', text:'#7dd3fc', sw:1 },
};
const catLabels = { concept:'CONCEPT (class)', subclass:'SUB-CLASS', adjacent:'ADJACENT SUB-CLASS', example:'EXAMPLE (not used)' };

const W = window.innerWidth, H = window.innerHeight;
const svg = d3.select('#canvas').attr('width', W).attr('height', H);

const defs = svg.append('defs');
Object.entries(relColors).forEach(([n, c]) => {
  defs.append('marker').attr('id',`a-${n}`).attr('viewBox','0 -5 10 10').attr('refX',20).attr('refY',0)
    .attr('markerWidth',6).attr('markerHeight',6).attr('orient','auto')
    .append('path').attr('d','M0,-4L10,0L0,4').attr('fill',c);
});

const g = svg.append('g');
const zm = d3.zoom().scaleExtent([0.12,4]).on('zoom', e => g.attr('transform', e.transform));
svg.call(zm);

const nodes = terms.map(t => ({...t, cat: getCat(t.id, t.type)}));
const links = uniqueRelations.map(r => ({source:r.source, target:r.target, name:r.name}));

const sim = d3.forceSimulation(nodes)
  .force('link', d3.forceLink(links).id(d=>d.id).distance(d=> d.name==='is'?85:165).strength(d=> d.name==='is'?0.22:0.5))
  .force('charge', d3.forceManyBody().strength(d=> d.cat==='concept'?-500:d.cat==='example'?-60:-150))
  .force('center', d3.forceCenter(W/2, H/2))
  .force('collision', d3.forceCollide().radius(d=> d.cat==='concept'?52:28))
  .force('x', d3.forceX(W/2).strength(0.025))
  .force('y', d3.forceY(H/2).strength(0.025));

const link = g.append('g').selectAll('line').data(links).join('line')
  .attr('stroke', d=> relColors[d.name]||'#333')
  .attr('stroke-width', d=> d.name==='is'?1:2)
  .attr('stroke-opacity', d=> d.name==='is'?0.22:0.5)
  .attr('stroke-dasharray', d=> d.name==='is'?'4,3':'none')
  .attr('marker-end', d=> `url(#a-${d.name})`);

const linkLbl = g.append('g').selectAll('text').data(links.filter(d=> d.name!=='is')).join('text')
  .attr('font-size',10).attr('font-family',"'JetBrains Mono',monospace")
  .attr('fill', d=> relColors[d.name]||'#666').attr('fill-opacity',0.7)
  .attr('text-anchor','middle').text(d=> d.name);

const node = g.append('g').selectAll('g').data(nodes).join('g').attr('cursor','pointer')
  .call(d3.drag().on('start',ds).on('drag',dd).on('end',de));

node.append('rect')
  .attr('rx', d=> d.cat==='concept'?6:4).attr('ry', d=> d.cat==='concept'?6:4)
  .attr('width', d=> { const cw=d.cat==='concept'?10:7, p=d.cat==='concept'?28:18; return Math.max(d.name.length*cw+p, d.cat==='concept'?100:55); })
  .attr('height', d=> d.cat==='concept'?38:26)
  .attr('x', d=> { const cw=d.cat==='concept'?10:7, p=d.cat==='concept'?28:18; return -Math.max(d.name.length*cw+p, d.cat==='concept'?100:55)/2; })
  .attr('y', d=> d.cat==='concept'?-19:-13)
  .attr('fill', d=> catStyle[d.cat].bg)
  .attr('stroke', d=> catStyle[d.cat].border)
  .attr('stroke-width', d=> catStyle[d.cat].sw);

node.append('text')
  .attr('text-anchor','middle').attr('dy','0.35em')
  .attr('font-size', d=> d.cat==='concept'?13:11)
  .attr('font-weight', d=> d.cat==='concept'?700:400)
  .attr('font-family',"'DM Sans',sans-serif")
  .attr('fill', d=> catStyle[d.cat].text)
  .text(d=> d.name);

const tip = document.getElementById('tooltip');

node.on('mouseenter', function(ev, d) {
  const rels = uniqueRelations.filter(r=> r.source===d.id||r.target===d.id);
  const rl = rels.map(r=> `${termMap[r.source]?.name||'?'} \u2192 ${r.name} \u2192 ${termMap[r.target]?.name||'?'}`);
  tip.querySelector('.tt-name').textContent = d.name;
  tip.querySelector('.tt-type').textContent = catLabels[d.cat];
  tip.querySelector('.tt-desc').textContent = d.description || 'No description provided.';
  tip.querySelector('.tt-synonyms').textContent = d.synonyms ? `Also known as: ${d.synonyms}` : '';
  tip.querySelector('.tt-relations').innerHTML = rl.length ? rl.map(r=>`<div class="tt-rel">${r}</div>`).join('') : '<div class="tt-rel">No direct relations</div>';
  tip.style.display = 'block';
  const cIds = new Set([d.id]); rels.forEach(r=> { cIds.add(r.source); cIds.add(r.target); });
  node.select('rect').attr('opacity', n=> cIds.has(n.id)?1:0.1);
  node.select('text').attr('opacity', n=> cIds.has(n.id)?1:0.1);
  link.attr('stroke-opacity', l=> (l.source.id===d.id||l.target.id===d.id)?0.9:0.03);
  linkLbl.attr('fill-opacity', l=> (l.source.id===d.id||l.target.id===d.id)?1:0.03);
});
node.on('mousemove', function(ev) {
  let x=ev.clientX+16, y=ev.clientY+16;
  if(x+410>window.innerWidth) x=ev.clientX-420;
  if(y+300>window.innerHeight) y=ev.clientY-300;
  tip.style.left=x+'px'; tip.style.top=y+'px';
});
node.on('mouseleave', function() {
  tip.style.display='none';
  node.select('rect').attr('opacity',1); node.select('text').attr('opacity',1);
  link.attr('stroke-opacity', d=> d.name==='is'?0.22:0.5);
  linkLbl.attr('fill-opacity',0.7);
});

sim.on('tick', ()=> {
  link.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
  linkLbl.attr('x',d=>(d.source.x+d.target.x)/2).attr('y',d=>(d.source.y+d.target.y)/2-6);
  node.attr('transform',d=>`translate(${d.x},${d.y})`);
});

function ds(e,d){if(!e.active)sim.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y;}
function dd(e,d){d.fx=e.x;d.fy=e.y;}
function de(e,d){if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null;}
function zoomIn(){svg.transition().duration(300).call(zm.scaleBy,1.3);}
function zoomOut(){svg.transition().duration(300).call(zm.scaleBy,0.7);}
function resetView(){svg.transition().duration(500).call(zm.transform,d3.zoomIdentity);}

setTimeout(()=>{
  const b=g.node().getBBox(), s=0.75/Math.max(b.width/W,b.height/H);
  const tx=W/2-s*(b.x+b.width/2), ty=H/2-s*(b.y+b.height/2);
  svg.transition().duration(800).call(zm.transform,d3.zoomIdentity.translate(tx,ty).scale(s));
},2000);
</script>
</body>
</html>
